name: speechact
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pip=23.0.1
  - ffmpeg
  - numpy=1.21.6
  - pandas
  - scipy
  - matplotlib
  - pyyaml
  - scikit-learn
  - scikit-image
  - tqdm
  - jupyter
  - ipython
  - pip:
    # 核心深度学习框架 (Mac版会自动下载CPU版本)
    - torch==1.13.1
    - torchvision==0.14.1
    - torchaudio==0.13.1
    
    # 常用工具
    - transformers==4.22.2
    - tokenizers==0.12.1
    - smplx==0.1.28
    - trimesh==3.14.1
    - yacs
    - chumpy
    - librosa==0.9.2
    - soundfile
    - opencv-python==4.7.0.72
    - tensorboardX
    - tensorboard
    - configargparse
    - einops
    - timm
    - omegaconf
    - huggingface-hub
    - textgrid
    - pyrender==0.1.45
    - pyopengl
    # 注意：macOS 上 pyopengl-accelerate 需要手动处理，这里先不加
    
    # 其他依赖
    - absl-py
    - attrs
    - audioread
    - certifi
    - cffi
    - charset-normalizer
    - decorator
    - filelock
    - fsspec
    - idna
    - imageio
    - imageio-ffmpeg
    - joblib
    - llvmlite
    - markdown
    - networkx
    - numba
    - packaging
    - pillow
    - platformdirs
    - pooch
    - protobuf
    - pycparser
    - pyparsing
    - python-dateutil
    - python-speech-features
    - pytz
    - pywavelets
    - pyzmq
    - regex
    - requests
    - requests-oauthlib
    - resampy
    - safetensors
    - sentencepiece
    - six
    - threadpoolctl
    - tifffile
    - typing-extensions
    - urllib3
    - werkzeug
    - zipp
    # 移除 nvidia-*, xorg-*, psbody-mesh (需单独安装)
    - moviepy==1.0.3
    